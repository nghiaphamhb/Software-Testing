name: SCA - OWASP Dependency-Check

on:
  push:
  pull_request:

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    env:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      DC_DATA_DIR: ${{ github.workspace }}/.dc-data

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Prepare Maven Wrapper
        shell: bash
        run: |
          test -f ./mvnw || (echo "mvnw not found. Add Maven Wrapper to repo." && exit 1)
          chmod +x ./mvnw || true
          bash ./mvnw -v

      - name: Cache Dependency-Check data
        uses: actions/cache@v4
        with:
          path: .dc-data
          key: dependency-check-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            dependency-check-${{ runner.os }}-

      - name: Dependency-Check (part1)
        id: dc1
        continue-on-error: true
        shell: bash
        run: |
          bash ./mvnw -B -f lab1/part1/pom.xml org.owasp:dependency-check-maven:check \
            -DdataDirectory="${DC_DATA_DIR}" \
            -DnvdApiKey="${NVD_API_KEY}" \
            -DnvdApiDelay=2000 \
            -DnvdMaxRetryCount=30 \
            -Dformat=HTML \
            -DfailBuildOnCVSS=7

      - name: Dependency-Check (part2)
        id: dc2
        continue-on-error: true
        shell: bash
        run: |
          bash ./mvnw -B -f lab1/part2/pom.xml org.owasp:dependency-check-maven:check \
            -DdataDirectory="${DC_DATA_DIR}" \
            -DnvdApiKey="${NVD_API_KEY}" \
            -DnvdApiDelay=2000 \
            -DnvdMaxRetryCount=30 \
            -Dformat=HTML \
            -DfailBuildOnCVSS=7

      - name: Dependency-Check (part3)
        id: dc3
        continue-on-error: true
        shell: bash
        run: |
          bash ./mvnw -B -f lab1/part3/pom.xml org.owasp:dependency-check-maven:check \
            -DdataDirectory="${DC_DATA_DIR}" \
            -DnvdApiKey="${NVD_API_KEY}" \
            -DnvdApiDelay=2000 \
            -DnvdMaxRetryCount=30 \
            -Dformat=HTML \
            -DfailBuildOnCVSS=7

      # Remote GitHub: upload artifacts; Local act: skip to avoid ACTIONS_RUNTIME_TOKEN issue
      - name: Upload reports
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: |
            lab1/part1/target/dependency-check-report.*
            lab1/part2/target/dependency-check-report.*
            lab1/part3/target/dependency-check-report.*
          if-no-files-found: ignore

      - name: Fail if any dependency-check failed
        if: ${{ always() }}
        shell: bash
        run: |
          failed=0
          [ "${{ steps.dc1.outcome }}" = "failure" ] && echo "part1 failed" && failed=1
          [ "${{ steps.dc2.outcome }}" = "failure" ] && echo "part2 failed" && failed=1
          [ "${{ steps.dc3.outcome }}" = "failure" ] && echo "part3 failed" && failed=1
          exit $failed